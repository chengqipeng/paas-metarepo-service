# RocketMQ
rocketmq:
  name-server: ${ROCKETMQ_NAMESRV:127.0.0.1:9876}
  producer:
    group: paas-metarepo-producer
    send-message-timeout: 3000

logging:
  level:
    com.hongyang.platform.metarepo: DEBUG
    org.springframework.cloud.openfeign: DEBUG

# 开发环境 SQL 日志
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Common 级数据库（p_meta_* / p_common_* 表所在的数据库）
metarepo:
  common-database: paas_metarepo_common
