# 生产环境：使用 PostgreSQL
spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${PG_HOST:10.65.2.6}:${PG_PORT:5432}/${PG_DB:crm_cd_data}?currentSchema=xsy_metarepo
    username: ${PG_USER:isales_db_isales_001}
    password: ${PG_PASSWORD:}
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 10000
  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: 0
    timeout: 3000
    lettuce:
      pool:
        max-active: 32
        max-idle: 16
        min-idle: 4

rocketmq:
  name-server: ${ROCKETMQ_NAMESRV:127.0.0.1:9876}
  producer:
    group: paas-metarepo-producer
    send-message-timeout: 3000

logging:
  level:
    com.rkhd.platform.metarepo: INFO
